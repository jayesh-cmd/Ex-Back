<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Get Ex Back</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;600;700&display=swap"
        rel="stylesheet" />
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --red: #E8192C;
            --red-dark: #c9101f;
            --white: #fff
        }

        body {
            font-family: 'Barlow', sans-serif;
            background: var(--red);
            color: var(--white);
            overflow-x: hidden
        }

        
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            padding: 18px 44px;
            display: flex;
            align-items: center;
            justify-content: space-between
        }

        .logo {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: .9rem;
            letter-spacing: .35em;
            text-transform: uppercase;
            opacity: .9
        }

        .logo span {
            opacity: .35
        }

        
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 44px;
            position: relative
        }

        .hero-num {
            display: none
        }

        .hero-num span {
            opacity: .25
        }

        .hero-num span.a {
            opacity: 1
        }

        .hero-headline {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(4rem, 12vw, 11rem);
            line-height: .88;
            text-transform: uppercase;
            letter-spacing: -.02em;
            opacity: 0;
            transform: translateY(44px);
            animation: up .85s cubic-bezier(.22, 1, .36, 1) .1s forwards
        }

        .hero-tagline {
            margin-top: 24px;
            max-width: 320px;
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.6;
            opacity: 0;
            animation: up .85s cubic-bezier(.22, 1, .36, 1) .35s forwards;
        }

        
        .upload-wrap {
            margin-top: 36px;
            opacity: 0;
            animation: up .85s cubic-bezier(.22, 1, .36, 1) .55s forwards
        }

        .drop-zone {
            display: inline-flex;
            align-items: center;
            gap: 14px;
            border: 1.5px dashed rgba(255, 255, 255, .35);
            padding: 16px 22px;
            border-radius: 3px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
            width: auto
        }

        .drop-zone:hover,
        .drop-zone.drag {
            border-color: rgba(255, 255, 255, .75);
            background: rgba(255, 255, 255, .05)
        }

        .drop-zone input {
            display: none
        }

        .dz-icon {
            font-size: 1.3rem;
            line-height: 1;
            opacity: .8
        }

        .dz-text p {
            font-size: .82rem;
            font-weight: 700
        }

        .dz-text small {
            font-size: .72rem;
            opacity: .5
        }

        .dz-file {
            font-size: .75rem;
            font-weight: 700;
            background: rgba(255, 255, 255, .15);
            padding: 4px 12px;
            border-radius: 999px;
            display: none;
            margin-left: 4px
        }

        .dz-file.show {
            display: inline-block
        }

        .analyse-btn {
            margin-top: 18px;
            display: none;
            background: rgba(0, 0, 0, .35);
            color: var(--white);
            border: 1.5px solid rgba(255, 255, 255, .3);
            padding: 11px 32px;
            border-radius: 999px;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: .95rem;
            font-weight: 900;
            letter-spacing: .12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .2s, border-color .2s
        }

        .analyse-btn.show {
            display: inline-block
        }

        .analyse-btn:hover {
            background: rgba(0, 0, 0, .55);
            border-color: rgba(255, 255, 255, .7)
        }

        .analyse-btn:disabled {
            opacity: .4;
            cursor: not-allowed
        }

        .loader {
            display: none;
            align-items: center;
            gap: 12px;
            margin-top: 20px
        }

        .loader.show {
            display: flex
        }

        .dots span {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--white);
            display: inline-block;
            animation: bounce .75s ease-in-out infinite
        }

        .dots span:nth-child(2) {
            animation-delay: .14s
        }

        .dots span:nth-child(3) {
            animation-delay: .28s
        }

        .dots {
            display: flex;
            gap: 6px
        }

        .loader-msg {
            font-size: .8rem;
            font-weight: 700;
            opacity: .65
        }

        .err-box {
            display: none;
            margin-top: 16px;
            background: rgba(0, 0, 0, .3);
            padding: 12px 18px;
            border-radius: 2px;
            font-size: .8rem;
            font-weight: 700;
            border-left: 2px solid rgba(255, 255, 255, .5)
        }

        .err-box.show {
            display: block
        }

        
        #carousel {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: var(--red);
            overflow: hidden
        }

        #carousel.show {
            display: block
        }

        .c-track {
            display: flex;
            height: 100vh;
            transition: transform .6s cubic-bezier(.77, 0, .18, 1);
            will-change: transform
        }

        
        .slide {
            min-width: 100vw;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 52px 44px 80px;
            flex-shrink: 0;
            overflow-y: auto;
            position: relative;
            background: var(--red)
        }

        .slide-inner {
            width: 100%;
            max-width: 820px;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity .45s ease .1s, transform .45s ease .1s
        }

        .slide.active .slide-inner {
            opacity: 1;
            transform: translateY(0)
        }

        .slide-label {
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .22em;
            text-transform: uppercase;
            opacity: .4;
            margin-bottom: 14px
        }

        .slide-title {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(2.4rem, 5.5vw, 5rem);
            text-transform: uppercase;
            line-height: .92;
            margin-bottom: 32px
        }

        
        .score-num {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(5rem, 16vw, 12rem);
            line-height: 1;
            display: flex;
            align-items: flex-end;
            gap: 8px
        }

        .score-num sup {
            font-size: 1.4rem;
            opacity: .3;
            margin-bottom: 8px;
            font-weight: 700
        }

        .score-bar-wrap {
            width: 100%;
            max-width: 440px;
            height: 2px;
            background: rgba(255, 255, 255, .15);
            margin: 12px 0 20px
        }

        .score-bar-fill {
            height: 100%;
            background: var(--white);
            width: 0;
            transition: width 1.3s cubic-bezier(.22, 1, .36, 1)
        }

        .score-reason {
            font-size: .95rem;
            font-weight: 700;
            line-height: 1.6;
            max-width: 560px;
            opacity: .9
        }

        
        .mistakes-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            max-width: 820px
        }

        .mk {
            border-top: 1px solid rgba(255, 255, 255, .15);
            padding: 20px 0;
            display: grid;
            grid-template-columns: 32px 1fr;
            gap: 20px
        }

        .mk:last-child {
            border-bottom: 1px solid rgba(255, 255, 255, .15)
        }

        .mk-n {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: 2rem;
            opacity: .18;
            line-height: 1
        }

        .mk-title {
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 6px
        }

        .mk-detail {
            font-size: .95rem;
            line-height: 1.6;
            opacity: .85;
            margin-bottom: 14px
        }

        .mk-instead-lbl {
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
            opacity: .4;
            margin-bottom: 6px
        }

        .mk-instead {
            font-size: .95rem;
            font-weight: 600;
            font-style: italic;
            background: rgba(255, 255, 255, .1);
            padding: 12px 16px;
            border-radius: 4px;
            border-left: 3px solid rgba(255, 255, 255, .4);
            line-height: 1.5
        }

        
        .msg-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-width: 660px
        }

        .msg-bubble {
            background: rgba(0, 0, 0, .18);
            border-radius: 3px;
            padding: 16px 20px;
            position: relative
        }

        .msg-lbl {
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
            opacity: .4;
            margin-bottom: 6px
        }

        .msg-txt {
            font-size: .88rem;
            font-weight: 700;
            line-height: 1.55;
            padding-right: 60px
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(255, 255, 255, .12);
            border: none;
            color: var(--white);
            padding: 4px 12px;
            border-radius: 999px;
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .2s
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, .25)
        }

        
        .moves-list {
            display: flex;
            flex-direction: column;
            gap: 0;
            max-width: 820px
        }

        .mv {
            border-top: 1px solid rgba(255, 255, 255, .15);
            padding: 20px 0
        }

        .mv:last-child {
            border-bottom: 1px solid rgba(255, 255, 255, .15)
        }

        .mv-title {
            font-family: 'Barlow', sans-serif;
            font-weight: 700;
            font-size: 1.15rem;
            margin-bottom: 6px
        }

        .mv-detail {
            font-size: .95rem;
            line-height: 1.6;
            opacity: .85
        }

        
        .openers-list {
            display: flex;
            flex-direction: column;
            gap: 28px;
            max-width: 720px
        }

        .op {
            border-left: 2px solid rgba(255, 255, 255, .3);
            padding-left: 22px
        }

        .op-idea {
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: .38;
            margin-bottom: 8px
        }

        .op-text {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 700;
            font-size: clamp(1.1rem, 2.5vw, 1.7rem);
            line-height: 1.25;
            margin-bottom: 10px
        }

        .op-copy {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, .2);
            border: none;
            color: var(--white);
            padding: 6px 14px;
            border-radius: 999px;
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background .2s;
            margin-bottom: 10px
        }

        .op-copy:hover {
            background: rgba(0, 0, 0, .4)
        }

        .op-esc-lbl {
            font-size: .6rem;
            font-weight: 700;
            letter-spacing: .15em;
            text-transform: uppercase;
            opacity: .35;
            margin-bottom: 4px
        }

        .op-esc {
            font-size: .8rem;
            line-height: 1.65;
            opacity: .65
        }

        
        .timing-wrap {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 24px;
            width: 100%
        }

        .timing-time {
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 900;
            font-size: clamp(4rem, 13vw, 9rem);
            line-height: 1
        }

        .timing-right {
            max-width: 320px
        }

        .timing-lbl {
            font-size: .62rem;
            font-weight: 700;
            letter-spacing: .2em;
            text-transform: uppercase;
            opacity: .38;
            margin-bottom: 8px
        }

        .timing-reason {
            font-size: .88rem;
            font-weight: 600;
            line-height: 1.6;
            opacity: .8
        }

        
        .c-nav {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            align-items: center;
            gap: 16px;
            z-index: 400
        }

        .c-nav.show {
            display: flex
        }

        .c-arrow {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, .3);
            background: rgba(0, 0, 0, .25);
            color: var(--white);
            font-size: .9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color .2s, background .2s;
            backdrop-filter: blur(4px)
        }

        .c-arrow:hover {
            border-color: rgba(255, 255, 255, .8);
            background: rgba(0, 0, 0, .5)
        }

        .c-arrow:disabled {
            opacity: .2;
            cursor: not-allowed
        }

        .c-dots {
            display: flex;
            gap: 6px;
            align-items: center
        }

        .c-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .25);
            cursor: pointer;
            transition: background .2s, transform .2s
        }

        .c-dot.a {
            background: var(--white);
            transform: scale(1.4)
        }

        .c-close {
            position: fixed;
            top: 20px;
            right: 28px;
            z-index: 401;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: 1.5px solid rgba(255, 255, 255, .3);
            background: rgba(0, 0, 0, .25);
            backdrop-filter: blur(4px);
            color: var(--white);
            font-size: 1rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: border-color .2s
        }

        .c-close.show {
            display: flex
        }

        .c-close:hover {
            border-color: rgba(255, 255, 255, .8)
        }

        .c-counter {
            position: fixed;
            top: 24px;
            left: 44px;
            z-index: 401;
            font-size: .65rem;
            font-weight: 700;
            letter-spacing: .15em;
            display: none;
            opacity: .7
        }

        .c-counter.show {
            display: block
        }

        
        @keyframes up {
            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(-9px)
            }
        }

        
        @media(max-width:768px) {
            nav {
                padding: 16px 22px
            }

            .hero {
                padding: 0 22px 52px
            }

            .hero-num,
            .hero-tagline {
                display: none
            }

            .slide {
                padding: 44px 22px 80px
            }

            .timing-wrap {
                flex-direction: column;
                align-items: flex-start
            }

            .c-close {
                right: 18px
            }

            .c-counter {
                left: 18px
            }
        }

        @media(max-width:480px) {
            .drop-zone {
                padding: 13px 16px
            }

            .slide {
                padding: 36px 16px 80px
            }
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">C<span>·</span>ANALYSER</div>
    </nav>

    <section class="hero">
        <div class="hero-num">
            <span class="a">01</span><span>02</span>
        </div>
        <h1 class="hero-headline">Get<br>Ex<br>Back.</h1>
        <p class="hero-tagline">Between what you're saying and what they actually want to hear.</p>

        <div class="upload-wrap">
            <div class="drop-zone" id="dropZone" onclick="document.getElementById('fi').click()">
                <input type="file" id="fi" accept=".txt" />
                <div class="dz-icon">📂</div>
                <div class="dz-text">
                    <p>Drop WhatsApp chat export</p>
                    <small>.txt files only</small>
                </div>
                <span class="dz-file" id="dzFile"></span>
            </div>
            <br />
            <button class="analyse-btn" id="analyseBtn" onclick="runAnalysis()">Analyse Now →</button>
            <div class="loader" id="loader">
                <div class="dots"><span></span><span></span><span></span></div>
                <span class="loader-msg" id="loaderMsg">Reading the vibes…</span>
            </div>
            <div class="err-box" id="errBox"></div>
        </div>
    </section>

    <div id="carousel">
        <div class="c-track" id="track"></div>
    </div>
    <button class="c-close" id="cClose" onclick="closeCarousel()">✕</button>
    <div class="c-counter" id="cCounter"></div>
    <div class="c-nav" id="cNav">
        <button class="c-arrow" id="cPrev" onclick="go(cur-1)">←</button>
        <div class="c-dots" id="cDots"></div>
        <button class="c-arrow" id="cNext" onclick="go(cur+1)">→</button>
    </div>

    <script>
        const API = 'http://localhost:8000';
        let file = null, cur = 0, total = 0, savedScore = 0;

        const dz = document.getElementById('dropZone'), fi = document.getElementById('fi');
        dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag') });
        dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
        dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag'); if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]) });
        fi.addEventListener('change', e => { if (e.target.files[0]) setFile(e.target.files[0]) });
        function setFile(f) {
            file = f;
            const el = document.getElementById('dzFile');
            el.textContent = '✓ ' + f.name; el.classList.add('show');
            document.getElementById('analyseBtn').classList.add('show');
            document.getElementById('errBox').classList.remove('show');
        }

        const MSGS = ['Reading the vibes…', 'Clocking patterns…', 'Cooking the analysis…', 'Almost ready…'];
        async function runAnalysis() {
            if (!file) return;
            const btn = document.getElementById('analyseBtn'), loader = document.getElementById('loader'), err = document.getElementById('errBox');
            btn.disabled = true; loader.classList.add('show'); err.classList.remove('show');
            let mi = 0; const iv = setInterval(() => { mi = (mi + 1) % MSGS.length; document.getElementById('loaderMsg').textContent = MSGS[mi] }, 2200);
            try {
                const fd = new FormData(); fd.append('chat_file', file);
                const res = await fetch(API + '/analyse', { method: 'POST', body: fd });
                const data = await res.json();
                if (!res.ok) throw new Error(data.detail || 'Something went wrong');
                build(data); openCarousel();
            } catch (e) { err.textContent = '⚠ ' + e.message; err.classList.add('show'); }
            finally { clearInterval(iv); loader.classList.remove('show'); btn.disabled = false; document.getElementById('loaderMsg').textContent = MSGS[0] }
        }

        function e(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;') }
        function eq(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/"/g, '&quot;') }

        function build(d) {
            savedScore = d.score;
            const track = document.getElementById('track'); track.innerHTML = '';
            const slides = [];

            slides.push(`<div class="slide">
    <div class="slide-inner">
      <div class="slide-label">Score · ${e(d.user_name)} → ${e(d.her_name)}</div>
      <div class="score-num"><span id="sNum">0</span><sup>/100</sup></div>
      <div class="score-bar-wrap"><div class="score-bar-fill" id="sBar"></div></div>
      <div class="score-reason">${e(d.score_reason)}</div>
    </div>
  </div>`);

            slides.push(`<div class="slide">
    <div class="slide-inner">
      <div class="slide-label">Mistakes — What Went Wrong</div>
      <div class="slide-title">What<br>Went Wrong.</div>
      <div class="mistakes-list">
        ${d.mistakes.map((m, i) => `<div class="mk">
          <div class="mk-n">0${i + 1}</div>
          <div>
            <div class="mk-title">${e(m.title)}</div>
            <div class="mk-detail">${e(m.detail)}</div>
            <div class="mk-instead-lbl">Instead →</div>
            <div class="mk-instead">${e(m.instead)}</div>
          </div>
        </div>`).join('')}
      </div>
    </div>
  </div>`);

            slides.push(`<div class="slide">
    <div class="slide-inner">
      <div class="slide-label">Messages — What To Send</div>
      <div class="slide-title">What<br>To Say.</div>
      <div class="msg-list">
        ${d.messages.map(m => `<div class="msg-bubble">
          <div class="msg-lbl">${e(m.label)}</div>
          <div class="msg-txt">${e(m.text)}</div>
          <button class="copy-btn" onclick="cp(this,'${eq(m.text)}')">Copy</button>
        </div>`).join('')}
      </div>
    </div>
  </div>`);

            slides.push(`<div class="slide">
    <div class="slide-inner">
      <div class="slide-label">Action Plan</div>
      <div class="slide-title" style="margin-bottom:20px;">Make Your Move<br>& Open Strong.</div>
      
      <div style="font-size: .7rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; opacity: .4; margin-bottom: 8px;">The Moves</div>
      <div class="moves-list" style="margin-bottom: 36px;">
        ${d.moves.map(m => `<div class="mv">
          <div class="mv-title">${e(m.title)}</div>
          <div class="mv-detail">${e(m.detail)}</div>
        </div>`).join('')}
      </div>

      <div style="font-size: .7rem; font-weight: 700; letter-spacing: .2em; text-transform: uppercase; opacity: .4; margin-bottom: -10px;">The Openers</div>
      <div class="openers-list">
        ${d.openers.map(o => `<div class="op">
          <div class="op-idea">${e(o.idea)}</div>
          <div class="op-text">"${e(o.text)}"</div>
          <button class="op-copy" onclick="cp(this,'${eq(o.text)}')">📋 Copy</button>
          <div class="op-esc-lbl">If she replies →</div>
          <div class="op-esc">${e(o.escalation)}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`);

            slides.push(`<div class="slide">
    <div class="slide-inner">
      <div class="slide-label">Best Time To Text</div>
      <div class="timing-wrap">
        <div class="timing-time">${e(d.best_time)}</div>
        <div class="timing-right">
          <div class="timing-lbl">Why</div>
          <div class="timing-reason">${e(d.best_time_reason)}</div>
        </div>
      </div>
    </div>
  </div>`);

            slides.forEach(h => { const div = document.createElement('div'); div.innerHTML = h; track.appendChild(div.firstElementChild) });
            total = slides.length;
            const dots = document.getElementById('cDots');
            dots.innerHTML = slides.map((_, i) => `<div class="c-dot${i === 0 ? ' a' : ''}" onclick="go(${i})"></div>`).join('');
            cur = 0; upNav();
        }

        function openCarousel() {
            document.getElementById('carousel').classList.add('show');
            ['cNav', 'cClose', 'cCounter'].forEach(id => document.getElementById(id).classList.add('show'));
            document.body.style.overflow = 'hidden';
            go(0, true);
        }
        function closeCarousel() {
            document.getElementById('carousel').classList.remove('show');
            ['cNav', 'cClose', 'cCounter'].forEach(id => document.getElementById(id).classList.remove('show'));
            document.body.style.overflow = '';
        }

        function go(n, instant) {
            const slides = document.querySelectorAll('#track .slide');
            if (slides[cur]) slides[cur].classList.remove('active');
            cur = Math.max(0, Math.min(n, total - 1));
            const track = document.getElementById('track');
            if (instant) { track.style.transition = 'none'; requestAnimationFrame(() => track.style.transition = 'transform .6s cubic-bezier(.77,0,.18,1)') }
            else track.style.transition = 'transform .6s cubic-bezier(.77,0,.18,1)';
            track.style.transform = `translateX(-${cur * 100}vw)`;
            if (slides[cur]) slides[cur].classList.add('active');
            if (cur === 0) {
                const el = document.getElementById('sNum'), bar = document.getElementById('sBar');
                if (el && bar) {
                    let c = 0; const iv = setInterval(() => { c = Math.min(c + savedScore / 55, savedScore); el.textContent = Math.floor(c); if (c >= savedScore) clearInterval(iv) }, 16);
                    setTimeout(() => bar.style.width = savedScore + '%', 200);
                }
            }
            upNav();
        }

        function upNav() {
            document.getElementById('cPrev').disabled = cur === 0;
            document.getElementById('cNext').disabled = cur === total - 1;
            document.querySelectorAll('.c-dot').forEach((d, i) => d.classList.toggle('a', i === cur));
            document.getElementById('cCounter').textContent = (cur + 1) + ' / ' + total;
        }

        document.addEventListener('keydown', e => {
            if (!document.getElementById('carousel').classList.contains('show')) return;
            if (e.key === 'ArrowRight') go(cur + 1);
            if (e.key === 'ArrowLeft') go(cur - 1);
            if (e.key === 'Escape') closeCarousel();
        });

        let tx = null;
        document.getElementById('carousel').addEventListener('touchstart', e => { tx = e.touches[0].clientX }, { passive: true });
        document.getElementById('carousel').addEventListener('touchend', e => {
            if (tx === null) return;
            const dx = e.changedTouches[0].clientX - tx;
            if (Math.abs(dx) > 50) go(cur + (dx < 0 ? 1 : -1));
            tx = null;
        }, { passive: true });

        function cp(btn, txt) {
            navigator.clipboard.writeText(txt).then(() => { const o = btn.textContent; btn.textContent = '✓'; setTimeout(() => btn.textContent = o, 2000) });
        }
    </script>
</body>

</html>
